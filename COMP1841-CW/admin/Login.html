<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Login- Film Review Database</title>
    <link rel="stylesheet" href="reviews.css">
    <style>
        body { background: #f4f6f9; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-box { background:white; padding:40px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1); width:420px; }
        h2 { color:#3cbc8d; text-align:center; }
        input[type="text"], input[type="password"] { width:100%; padding:12px; margin:10px 0; border:2px solid #ddd; border-radius:8px; }
        input[type="submit"] { background:#3cbc8d; color:white; font-weight:bold; padding:12px; border:none; border-radius:8px; width:100%; cursor:pointer; }
        input[type="submit"]:hover { background:#2a9c6e; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login Film Review</h2>
        <form action="Validate.php" method="post">
            <label>Username:</label>
            <input type="text" name="username" required>

            <label>Password:</label>
            <input type="password" name="password" required>

            <input type="submit" value="Login">
        </form>
    </div>
</body>
</html>
